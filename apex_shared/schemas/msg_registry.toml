# msg_registry.toml — 중앙 msg_id 레지스트리
# coordinator가 msg_id 할당 독점. 에이전트는 .fbs 스키마만 작성.
# 규칙: 퇴역된 msg_id는 영원히 재사용 금지.

[system]
range = [0, 999]
description = "시스템/Gateway 예약 범위"

[[system.allocated]]
id = 1
name = "Heartbeat"
status = "active"
schema = "apex_core/schemas/heartbeat.fbs"

[[system.allocated]]
id = 2
name = "SystemErrorResponse"
status = "active"
schema = "apex_core/schemas/error_response.fbs"

[[system.allocated]]
id = 10
name = "RefreshTokenRequest"
status = "active"
schema = "apex_shared/schemas/refresh_token_request.fbs"

[[system.allocated]]
id = 11
name = "RefreshTokenResponse"
status = "active"
schema = "apex_shared/schemas/refresh_token_response.fbs"

[auth]
range = [1000, 1999]
description = "Auth Service 메시지 범위"

[[auth.allocated]]
