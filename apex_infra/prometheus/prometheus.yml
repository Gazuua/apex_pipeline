global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- Apex 서비스 엔드포인트 ---
  - job_name: "apex-gateway"
    static_configs:
      - targets: ["host.docker.internal:8081"]
    metrics_path: /metrics

  - job_name: "apex-auth"
    static_configs:
      - targets: ["host.docker.internal:8082"]
    metrics_path: /metrics

  - job_name: "apex-chat"
    static_configs:
      - targets: ["host.docker.internal:8083"]
    metrics_path: /metrics
