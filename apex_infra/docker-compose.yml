# Apex Pipeline - 로컬 개발 환경
# 기본:          docker compose up -d
# observability: docker compose --profile observability up -d
# 초기화:        docker compose down -v

services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: apex-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ylC7Hvk5Qp-zUaVUzeeL4g
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - apex-net
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 5

  # --- Redis x4 (물리 분리 — 장애 격리 + 트래픽 특성별 최적화) ---

  # Redis #0: Auth 전용 (세션, JWT 블랙리스트) — 읽기 위주, TTL 기반 자동 만료
  redis-auth:
    image: redis:7.4.2-alpine
    container_name: apex-redis-auth
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_AUTH_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_AUTH_PASSWORD:-dev_redis_pass}
    volumes:
      - redis-auth-data:/data
    networks:
      - apex-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis #1: Gateway 전용 (Rate Limit 카운터) — 쓰기 집중, 높은 TPS, 짧은 TTL
  redis-ratelimit:
    image: redis:7.4.2-alpine
    container_name: apex-redis-ratelimit
    restart: unless-stopped
    ports:
      - "6381:6379"
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_RATELIMIT_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_RATELIMIT_PASSWORD:-dev_redis_pass}
    volumes:
      - redis-ratelimit-data:/data
    networks:
      - apex-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis #2: Chat 데이터 (방 멤버십, 접속 상태) — 읽기/쓰기 혼합
  redis-chat:
    image: redis:7.4.2-alpine
    container_name: apex-redis-chat
    restart: unless-stopped
    ports:
      - "6382:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_CHAT_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_CHAT_PASSWORD:-dev_redis_pass}
    volumes:
      - redis-chat-data:/data
    networks:
      - apex-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis #3: Pub/Sub 전용 (브로드캐스트) — 메시지 버스, persistence 불필요
  redis-pubsub:
    image: redis:7.4.2-alpine
    container_name: apex-redis-pubsub
    restart: unless-stopped
    ports:
      - "6383:6379"
    command: >
      redis-server
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_PUBSUB_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_PUBSUB_PASSWORD:-dev_redis_pass}
    networks:
      - apex-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16.8-alpine
    container_name: apex-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex}
      POSTGRES_AUTH_ROLE_PASSWORD: ${POSTGRES_AUTH_ROLE_PASSWORD:-auth_secret_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/000_init.sql:ro
      - ../apex_services/auth-svc/migrations/001_create_schema_and_role.sh:/docker-entrypoint-initdb.d/001_create_schema_and_role.sh:ro
      - ../apex_services/auth-svc/migrations/001_create_schema_and_role.sql:/docker-entrypoint-initdb.d/001_create_schema_and_role.sql:ro
    networks:
      - apex-net
    healthcheck:
      test: pg_isready -U apex -d apex
      interval: 10s
      timeout: 3s
      retries: 3

  pgbouncer:
    image: bitnami/pgbouncer:1.25.1
    container_name: apex-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: apex
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-apex}
      POSTGRESQL_DATABASE: apex
      PGBOUNCER_DATABASE: apex
      PGBOUNCER_PORT: "6432"
      PGBOUNCER_AUTH_TYPE: md5
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_MAX_CLIENT_CONN: "200"
      PGBOUNCER_MAX_DB_CONNECTIONS: "50"
      PGBOUNCER_QUERY_WAIT_TIMEOUT: "120"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: "300"
    networks:
      - apex-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: pg_isready -h localhost -p 6432
      interval: 10s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: apex-prometheus
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - apex-net
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:12.4.0
    container_name: apex-grafana
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - apex-net
    depends_on:
      - prometheus
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  kafka-data:
  redis-auth-data:
  redis-ratelimit-data:
  redis-chat-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  apex-net:
    driver: bridge
