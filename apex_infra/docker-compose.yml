# Apex Pipeline - 로컬 개발 환경
# 기본:          docker compose up -d
# observability: docker compose --profile observability up -d
# 초기화:        docker compose down -v

services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: apex-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ylC7Hvk5Qp-zUaVUzeeL4g
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - apex-net
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # 세션/토큰 저장 겸용이므로 RDB 스냅샷(save) 기본값 유지
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - apex-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: apex-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - apex-net
    healthcheck:
      test: pg_isready -U apex -d apex
      interval: 10s
      timeout: 3s
      retries: 3

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: apex-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: postgres://apex:apex@postgres:5432/apex
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - apex-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: pg_isready -h localhost -p 6432
      interval: 10s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: apex-prometheus
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - apex-net
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:12.4.0
    container_name: apex-grafana
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - apex-net
    depends_on:
      - prometheus
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  kafka-data:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  apex-net:
    driver: bridge
