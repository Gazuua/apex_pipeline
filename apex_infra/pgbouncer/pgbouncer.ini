[databases]
apex = host=postgres port=5432 dbname=apex

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 20
min_pool_size = 5
max_client_conn = 200
max_db_connections = 50
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 0
query_wait_timeout = 120
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
admin_users = apex
stats_users = apex
