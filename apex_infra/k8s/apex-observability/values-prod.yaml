# Apex Observability — 프로덕션 오버라이드
# 사용: helm install ... -f values.yaml -f values-prod.yaml

# ---------------------------------------------------------------------------
# Loki
# ---------------------------------------------------------------------------
loki:
  singleBinary:
    replicas: 1
    persistence:
      size: 50Gi
  loki:
    auth_enabled: true
    limits_config:
      retention_period: 720h    # 30일
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# ---------------------------------------------------------------------------
# Vector
# ---------------------------------------------------------------------------
vector:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Grafana
# ---------------------------------------------------------------------------
grafana:
  adminPassword: ""  # base values의 평문 패스워드 무효화 — existingSecret으로 대체
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: "admin-user"
    passwordKey: "admin-password"
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
