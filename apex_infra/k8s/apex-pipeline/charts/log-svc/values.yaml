#
# Log Service — Kafka consumer, metrics-only Service (inbound app port 없음)
# 바이너리 미구현 (BACKLOG-199) — enabled: false 기본
# Kafka만 의존 (Redis, PG 없음)

# 기본 비활성화 — umbrella chart의 condition: log-svc.enabled로 제어
enabled: false

replicaCount: 1

image:
  repository: ghcr.io/gazuua/apex-pipeline-log-svc
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8084
      targetPort: 8084

config:
  fileName: "log_svc.toml"
  mountPath: "/app"
  content: |
    # Log Service Configuration — K8s (stub)

    [logging]
    service_name = "log-svc"

    [logging.file]
    enabled = false

    [kafka]
    brokers = "apex-infra-kafka.apex-infra.svc.cluster.local:9092"
    consumer_group = "log-svc"
    consume_topics = ["logs.ingest"]

    [metrics]
    enabled = true
    port = 8084

probes:
  startup:
    httpGet:
      path: /health
      port: 8084
    failureThreshold: 30
    periodSeconds: 5
  liveness:
    httpGet:
      path: /health
      port: 8084
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    httpGet:
      path: /ready
      port: 8084
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

extraVolumes: []
extraVolumeMounts: []
extraEnv: []

secrets: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

serviceMonitor:
  enabled: true
  port: metrics
  path: /metrics
  interval: 15s

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Argo Rollouts (Canary 배포)
# ---------------------------------------------------------------------------
rollouts:
  enabled: false
  canary:
    steps:
      - setWeight: 10
      - pause: {}
      - setWeight: 50
      - pause: {}
      - setWeight: 100
