{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "apex-common.fullname" . }}
  labels:
    {{- include "apex-common.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "apex-common.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus metrics scrape only
    - ports:
        - port: 8084
          protocol: TCP
  egress:
    # Kafka (consume logs)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apex-infra
      ports:
        - port: 9092
          protocol: TCP
    # DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
