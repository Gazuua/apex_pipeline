apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "apex-common.fullname" . }}-test"
  labels:
    {{- include "apex-common.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: busybox:1.37
      command: ['sh', '-c', 'nc -z {{ include "apex-common.fullname" . }} 8082 && echo SUCCESS']
  restartPolicy: Never
