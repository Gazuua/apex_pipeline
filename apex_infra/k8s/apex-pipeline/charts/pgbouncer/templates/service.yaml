apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgbouncer.fullname" . }}
  labels:
    {{- include "pgbouncer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: pgbouncer
      port: {{ .Values.service.port }}
      targetPort: pgbouncer
      protocol: TCP
  selector:
    {{- include "pgbouncer.selectorLabels" . | nindent 4 }}
