# === 앱 서비스 ===
gateway:
  enabled: true
  rollouts:
    enabled: false

auth-svc:
  enabled: true
  rollouts:
    enabled: false

chat-svc:
  enabled: true
  rollouts:
    enabled: false

# === Bitnami 글로벌 설정 ===
# Bitnami가 Docker Hub에서 이미지를 삭제했으므로 AWS ECR Public을 사용.
# ECR 레지스트리를 비표준으로 간주하는 Bitnami 보안 검증을 비활성화.
# 참고: BACKLOG-216
global:
  security:
    allowInsecureImages: true

# === 인프라 (Bitnami) ===
kafka:
  enabled: true
  image:
    registry: public.ecr.aws
  listeners:
    client:
      protocol: PLAINTEXT  # 로컬 minikube 전용 — 프로덕션에서는 반드시 SASL_SSL 사용
  controller:
    replicaCount: 1
  kraft:
    clusterId: "k8s-apex-cluster-001"

redis-auth:
  enabled: true
  image:
    registry: public.ecr.aws
  architecture: standalone
  auth:
    password: "dev_redis_pass"
  master:
    persistence:
      size: 1Gi

redis-ratelimit:
  enabled: true
  image:
    registry: public.ecr.aws
  architecture: standalone
  auth:
    password: "dev_redis_pass"
  master:
    persistence:
      enabled: false

redis-chat:
  enabled: true
  image:
    registry: public.ecr.aws
  architecture: standalone
  auth:
    password: "dev_redis_pass"
  master:
    persistence:
      size: 1Gi

redis-pubsub:
  enabled: true
  image:
    registry: public.ecr.aws
  architecture: standalone
  auth:
    password: "dev_redis_pass"
  master:
    persistence:
      enabled: false

postgresql:
  enabled: true
  image:
    registry: public.ecr.aws
  auth:
    postgresPassword: "apex"
    username: "apex_user"
    password: "apex_pass"
    database: "apex_db"
  primary:
    persistence:
      size: 5Gi

pgbouncer:
  enabled: true

# === External Secrets Operator ===
# 로컬 환경에서는 ESO 비활성화 — 기존 secrets.data로 K8s Secret 직접 생성
externalSecrets:
  enabled: false
  refreshInterval: "0"  # ⚠ ESO 활성화 시 반드시 values-prod.yaml에서 "1h" 등으로 오버라이드
