# Per-service SecretStore + ServiceAccount (BACKLOG-252)
# 각 서비스별 독립 SA → IAM role → AWS SM prefix 격리
# 서비스 추가 시 values externalSecrets.secrets에 엔트리 추가만으로 자동 생성
{{- if .Values.externalSecrets.enabled }}
{{- range $name, $svc := .Values.externalSecrets.secrets }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-secrets-sa
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: apex-pipeline
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: external-secrets
    apex.io/secret-scope: {{ $name }}
  {{- if $svc.iamRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ $svc.iamRoleArn | quote }}
  {{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ $name }}-secret-store
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: apex-pipeline
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: external-secrets
    apex.io/secret-scope: {{ $name }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ $.Values.externalSecrets.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ $name }}-secrets-sa
{{- end }}
{{- end }}
