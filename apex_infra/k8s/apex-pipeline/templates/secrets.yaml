{{/* RSA 키 Secret — create=true일 때만 생성 */}}
{{- if .Values.rsaKeys.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.rsaKeys.secretName | default "apex-rsa-keys" }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  auth_rs256.pem: {{ .Values.rsaKeys.privateKey | b64enc | quote }}
  auth_rs256_pub.pem: {{ .Values.rsaKeys.publicKey | b64enc | quote }}
{{- end }}
