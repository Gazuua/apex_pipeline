# Apex Pipeline - E2E 통합 테스트 환경
# 사용법:
#   기동: docker compose -f apex_infra/docker/docker-compose.e2e.yml up -d --wait
#   종료: docker compose -f apex_infra/docker/docker-compose.e2e.yml down -v

services:
  # --- Kafka (KRaft mode, Zookeeper-less) ---
  kafka:
    image: apache/kafka:4.2.0
    container_name: apex-e2e-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: e2e-apex-cluster-001
    volumes:
      - kafka-e2e-data:/var/lib/kafka/data
      - ./init-kafka.sh:/init-kafka.sh:ro
    networks:
      - apex-e2e-net
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Redis x4 (physically separated) ---

  # Redis #0: Auth (sessions, JWT blacklist)
  redis-auth:
    image: redis:7.4.2-alpine
    container_name: apex-e2e-redis-auth
    ports:
      - "6380:6379"
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_AUTH_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_AUTH_PASSWORD:-dev_redis_pass}
    networks:
      - apex-e2e-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  # Redis #1: Gateway (Rate Limit counters)
  redis-ratelimit:
    image: redis:7.4.2-alpine
    container_name: apex-e2e-redis-ratelimit
    ports:
      - "6381:6379"
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_RATELIMIT_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_RATELIMIT_PASSWORD:-dev_redis_pass}
    networks:
      - apex-e2e-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  # Redis #2: Chat data (room membership, online status)
  redis-chat:
    image: redis:7.4.2-alpine
    container_name: apex-e2e-redis-chat
    ports:
      - "6382:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_CHAT_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_CHAT_PASSWORD:-dev_redis_pass}
    networks:
      - apex-e2e-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  # Redis #3: Pub/Sub (broadcast only, no persistence)
  redis-pubsub:
    image: redis:7.4.2-alpine
    container_name: apex-e2e-redis-pubsub
    ports:
      - "6383:6379"
    command: >
      redis-server
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_PUBSUB_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_PUBSUB_PASSWORD:-dev_redis_pass}
    networks:
      - apex-e2e-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  # --- PostgreSQL ---
  postgres:
    image: postgres:16.8-alpine
    container_name: apex-e2e-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: apex_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_e2e_password}
      POSTGRES_DB: apex_db
    volumes:
      - ./init-sql:/docker-entrypoint-initdb.d:ro
      - postgres-e2e-data:/var/lib/postgresql/data
    networks:
      - apex-e2e-net
    healthcheck:
      test: pg_isready -U apex_admin -d apex_db
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services ---

  gateway:
    build:
      context: ../..
      dockerfile: apex_infra/docker/service.Dockerfile
      target: runtime
      args:
        CI_IMAGE_TAG: ${CI_IMAGE_TAG:?CI_IMAGE_TAG is required}
        CMAKE_TARGET: apex_gateway
        SERVICE_DIR: gateway
        CONFIG_FILE: gateway_e2e.toml
    container_name: apex-e2e-gateway
    ports:
      - "8443:8443"
      - "8444:8444"
    volumes:
      - ../../apex_services/tests/keys/:/app/keys/:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis-auth:
        condition: service_healthy
      redis-ratelimit:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
    networks:
      - apex-e2e-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8443 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  auth-svc:
    build:
      context: ../..
      dockerfile: apex_infra/docker/service.Dockerfile
      target: runtime
      args:
        CI_IMAGE_TAG: ${CI_IMAGE_TAG:?CI_IMAGE_TAG is required}
        CMAKE_TARGET: auth_svc_main
        SERVICE_DIR: auth-svc
        CONFIG_FILE: auth_svc_e2e.toml
    container_name: apex-e2e-auth-svc
    volumes:
      - ../../apex_services/tests/keys/:/app/keys/:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis-auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - apex-e2e-net

  chat-svc:
    build:
      context: ../..
      dockerfile: apex_infra/docker/service.Dockerfile
      target: runtime
      args:
        CI_IMAGE_TAG: ${CI_IMAGE_TAG:?CI_IMAGE_TAG is required}
        CMAKE_TARGET: chat_svc_main
        SERVICE_DIR: chat-svc
        CONFIG_FILE: chat_svc_e2e.toml
    container_name: apex-e2e-chat-svc
    depends_on:
      kafka:
        condition: service_healthy
      redis-chat:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - apex-e2e-net

volumes:
  kafka-e2e-data:
  postgres-e2e-data:

networks:
  apex-e2e-net:
    driver: bridge
