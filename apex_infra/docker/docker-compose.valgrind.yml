# Valgrind override for nightly E2E
# Usage: docker compose -f docker-compose.e2e.yml -f docker-compose.valgrind.yml up -d --build

services:
  gateway:
    build:
      target: valgrind
      args:
        CMAKE_TARGET: apex_gateway
        SERVICE_DIR: gateway
        CONFIG_FILE: gateway_e2e.toml
    environment:
      - APEX_REQUEST_TIMEOUT_MS=60000
    healthcheck:
      interval: 15s
      timeout: 30s
      retries: 15
      start_period: 60s

  auth-svc:
    build:
      target: valgrind
      args:
        CMAKE_TARGET: auth_svc_main
        SERVICE_DIR: auth-svc
        CONFIG_FILE: auth_svc_e2e.toml

  chat-svc:
    build:
      target: valgrind
      args:
        CMAKE_TARGET: chat_svc_main
        SERVICE_DIR: chat-svc
        CONFIG_FILE: chat_svc_e2e.toml

  kafka:
    healthcheck:
      interval: 15s
      timeout: 10s
      retries: 15
