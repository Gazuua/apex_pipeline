# Apex Pipeline — 스모크 테스트 환경
# 사전 빌드된 GHCR 이미지로 풀스택 기동 + 이미지 유효성 검증
# 사용법:
#   기동: SHA_TAG=sha-xxx docker compose -f apex_infra/docker/docker-compose.smoke.yml up -d --wait
#   종료: docker compose -f apex_infra/docker/docker-compose.smoke.yml down -v

services:
  # --- Kafka (KRaft mode, Zookeeper-less) ---
  kafka:
    image: apache/kafka:4.2.0
    container_name: apex-smoke-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: smoke-apex-cluster-001
    volumes:
      - kafka-smoke-data:/var/lib/kafka/data
    networks:
      - apex-smoke-net
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Redis x4 (physically separated) ---

  redis-auth:
    image: redis:7.4.2-alpine
    container_name: apex-smoke-redis-auth
    ports:
      - "6380:6379"
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_AUTH_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_AUTH_PASSWORD:-dev_redis_pass}
    networks:
      - apex-smoke-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  redis-ratelimit:
    image: redis:7.4.2-alpine
    container_name: apex-smoke-redis-ratelimit
    ports:
      - "6381:6379"
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_RATELIMIT_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_RATELIMIT_PASSWORD:-dev_redis_pass}
    networks:
      - apex-smoke-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  redis-chat:
    image: redis:7.4.2-alpine
    container_name: apex-smoke-redis-chat
    ports:
      - "6382:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_CHAT_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_CHAT_PASSWORD:-dev_redis_pass}
    networks:
      - apex-smoke-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  redis-pubsub:
    image: redis:7.4.2-alpine
    container_name: apex-smoke-redis-pubsub
    ports:
      - "6383:6379"
    command: >
      redis-server
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --requirepass ${REDIS_PUBSUB_PASSWORD:-dev_redis_pass}
    environment:
      REDISCLI_AUTH: ${REDIS_PUBSUB_PASSWORD:-dev_redis_pass}
    networks:
      - apex-smoke-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 3s
      timeout: 2s
      retries: 5

  # --- PostgreSQL ---
  postgres:
    image: postgres:16.8-alpine
    container_name: apex-smoke-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: apex_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_e2e_password}
      POSTGRES_DB: apex_db
    volumes:
      - ./init-sql:/docker-entrypoint-initdb.d:ro
      - postgres-smoke-data:/var/lib/postgresql/data
    networks:
      - apex-smoke-net
    healthcheck:
      test: pg_isready -U apex_admin -d apex_db
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services (pre-built images) ---

  gateway:
    image: ghcr.io/gazuua/apex-pipeline-gateway:${SHA_TAG:?SHA_TAG is required}
    container_name: apex-smoke-gateway
    ports:
      - "8443:8443"
      - "8444:8444"
      - "8081:8081"
    volumes:
      - ../../apex_services/tests/e2e/docker/gateway_docker.toml:/app/config.toml:ro
      - ../../apex_services/tests/keys/:/app/keys/:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis-auth:
        condition: service_healthy
      redis-ratelimit:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
    networks:
      - apex-smoke-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  auth-svc:
    image: ghcr.io/gazuua/apex-pipeline-auth-svc:${SHA_TAG:?SHA_TAG is required}
    container_name: apex-smoke-auth-svc
    volumes:
      - ../../apex_services/tests/e2e/docker/auth_svc_docker.toml:/app/config.toml:ro
      - ../../apex_services/tests/keys/:/app/keys/:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis-auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - apex-smoke-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  chat-svc:
    image: ghcr.io/gazuua/apex-pipeline-chat-svc:${SHA_TAG:?SHA_TAG is required}
    container_name: apex-smoke-chat-svc
    volumes:
      - ../../apex_services/tests/e2e/docker/chat_svc_docker.toml:/app/config.toml:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis-chat:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - apex-smoke-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  kafka-smoke-data:
  postgres-smoke-data:

networks:
  apex-smoke-net:
    driver: bridge
