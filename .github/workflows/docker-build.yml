name: Docker CI Image

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apex_infra/docker/ci.Dockerfile
          push: true
          tags: |
            ghcr.io/gazuua/apex-pipeline-ci:latest
            ghcr.io/gazuua/apex-pipeline-ci:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/gazuua/apex-pipeline-ci:latest
          cache-to: type=inline

      - name: Update ci-image-tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "sha-${{ github.sha }}" > .github/ci-image-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ci-image-tag
          git diff --staged --quiet || git commit -m "chore(ci): update ci-image-tag to sha-${{ github.sha }} [skip ci]"
          git push
