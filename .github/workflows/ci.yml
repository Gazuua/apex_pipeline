name: CI

permissions: {}

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ci-image-tag'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ci-image-tag'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # CI_IMAGE_TAG is read from .github/ci-image-tag by the changes job

jobs:
  # ── Path filter (Docker / Source 변경 감지) ────
  changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      source: ${{ steps.filter.outputs.source }}
      go: ${{ steps.filter.outputs.go }}
      ci_image_tag: ${{ steps.read-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read CI image tag
        id: read-tag
        run: echo "tag=$(cat .github/ci-image-tag | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'apex_infra/docker/ci.Dockerfile'
              - '**/vcpkg.json'
            source:
              - '**/*.cpp'
              - '**/*.hpp'
              - '**/*.h'
              - '.clang-format'
              - '**/CMakeLists.txt'
              - '**/CMakePresets.json'
              - '**/vcpkg.json'
              - 'cmake/**'
              - '**/*_suppressions.txt'
              - '.github/workflows/**'
              - 'build.bat'
              - 'build.sh'
              - 'apex_core/build.bat'
              - 'apex_core/build.sh'
              - 'apex_tools/build-preflight.bat'
              - 'apex_tools/build-preflight.sh'
            go:
              - 'apex_tools/apex-agent/**/*.go'
              - 'apex_tools/apex-agent/go.mod'
              - 'apex_tools/apex-agent/go.sum'

  # ── Format check (clang-format) ────────────────
  format-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes]
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: pip install clang-format==21.1.8
      - name: Check formatting
        run: |
          find apex_core apex_shared apex_services \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
            ! -name '*_generated.h' \
            | xargs clang-format --dry-run --Werror

  build-image:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    uses: ./.github/workflows/docker-build.yml
    permissions:
      contents: write
      packages: write

  # ── Source build & test ──────────────────────────
  build:
    permissions:
      contents: read
    needs: [changes, build-image]
    if: >-
      always() &&
      needs.changes.outputs.source == 'true' &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            preset: debug
            container: true
          - name: linux-asan
            os: ubuntu-latest
            preset: asan
            container: true
          - name: linux-tsan
            os: ubuntu-latest
            preset: tsan
            container: true
          - name: linux-ubsan
            os: ubuntu-latest
            preset: ubsan
            container: true
          # MSVC 제거 — 프로덕션 타겟이 Linux이고, 로컬 Windows 빌드로 MSVC 검증 충분.
          # Linux 성공 + MSVC 실패 사례는 사실상 없음 (반대는 빈번).

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: ghcr.io/gazuua/apex-pipeline-ci:${{ needs.changes.outputs.ci_image_tag }}

    env:
      VCPKG_ROOT: /opt/vcpkg

    steps:
      - uses: actions/checkout@v4

      # ── Build & test ─────────────────────────────
      - name: Configure
        run: >-
          cmake --preset ${{ matrix.preset }}
          -DVCPKG_INSTALLED_DIR=/opt/vcpkg_installed

      - name: Build
        run: cmake --build build/Linux/${{ matrix.preset }}

      - name: Upload service binaries
        if: matrix.name == 'linux-gcc'
        uses: actions/upload-artifact@v4
        with:
          name: service-binaries
          path: |
            build/Linux/debug/apex_services/gateway/apex_gateway
            build/Linux/debug/apex_services/auth-svc/auth_svc_main
            build/Linux/debug/apex_services/chat-svc/chat_svc_main
            build/Linux/debug/apex_services/tests/e2e/apex_e2e_tests
          retention-days: 1

      - name: Test
        run: ctest --preset ${{ matrix.preset }} -LE e2e

  # ── E2E integration tests ─────────────────────
  e2e:
    permissions:
      contents: read
    needs: [changes, build]
    if: >-
      always() &&
      needs.changes.outputs.source == 'true' &&
      needs.build.result == 'success'
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI_IMAGE_TAG: ${{ needs.changes.outputs.ci_image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Download service binaries
        uses: actions/download-artifact@v4
        with:
          name: service-binaries
          path: artifacts

      - name: Make binaries executable
        run: chmod +x artifacts/gateway/apex_gateway artifacts/auth-svc/auth_svc_main artifacts/chat-svc/chat_svc_main artifacts/tests/e2e/apex_e2e_tests

      # 인프라만 Docker로 기동 (Kafka, Redis×4, PostgreSQL)
      # 서비스(Gateway, Auth, Chat)는 호스트에서 직접 실행 — Docker 이미지 빌드 불필요
      - name: Start infrastructure
        run: |
          docker compose -f apex_infra/docker/docker-compose.e2e.yml up -d \
            kafka redis-auth redis-ratelimit redis-chat redis-pubsub postgres \
            --wait --timeout 120

      - name: Start services
        run: |
          nohup artifacts/gateway/apex_gateway apex_services/tests/e2e/gateway_e2e.toml > /tmp/gateway.log 2>&1 &
          nohup artifacts/auth-svc/auth_svc_main apex_services/tests/e2e/auth_svc_e2e.toml > /tmp/auth.log 2>&1 &
          nohup artifacts/chat-svc/chat_svc_main apex_services/tests/e2e/chat_svc_e2e.toml > /tmp/chat.log 2>&1 &

          # Gateway TCP 포트 대기 (최대 60초) + Kafka consumer rebalance 여유
          timeout 60 bash -c 'until nc -z 127.0.0.1 8443 2>/dev/null; do sleep 1; done'
          sleep 5  # Kafka consumer rebalance 추가 대기

      - name: Run E2E tests
        run: |
          artifacts/tests/e2e/apex_e2e_tests \
            --gtest_output=xml:e2e-results.xml
        env:
          E2E_GATEWAY_HOST: "127.0.0.1"
          E2E_GATEWAY_TCP_PORT: "8443"
          E2E_STARTUP_TIMEOUT: "60"

      - name: Service logs (debug)
        if: always()
        run: |
          echo "=== Gateway ===" && cat /tmp/gateway.log 2>/dev/null | tail -30 || true
          echo "=== Auth ===" && cat /tmp/auth.log 2>/dev/null | tail -30 || true
          echo "=== Chat ===" && cat /tmp/chat.log 2>/dev/null | tail -30 || true

      - name: Teardown
        if: always()
        run: |
          pkill -f apex_gateway || true
          pkill -f auth_svc_main || true
          pkill -f chat_svc_main || true
          docker compose -f apex_infra/docker/docker-compose.e2e.yml down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results.xml
          retention-days: 7

  # ── Go (apex-agent) ──────────────────────────────
  go-test:
    permissions:
      contents: read
    name: Go (apex-agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    defaults:
      run:
        working-directory: apex_tools/apex-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apex_tools/apex-agent/go.mod
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./... -race -cover -v
      - name: Build (linux)
        run: go build -o apex-agent ./cmd/apex-agent
      - name: Build (windows cross-compile)
        run: GOOS=windows GOARCH=amd64 go build -o apex-agent.exe ./cmd/apex-agent
