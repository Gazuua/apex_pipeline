name: CI

permissions: {}

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ci-image-tag'
      - '.github/tools-image-tag'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ci-image-tag'
      - '.github/tools-image-tag'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # CI_IMAGE_TAG is read from .github/ci-image-tag by the changes job

jobs:
  # ── Path filter (Docker / Source 변경 감지) ────
  changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      source: ${{ steps.filter.outputs.source }}
      go: ${{ steps.filter.outputs.go }}
      ci_image_tag: ${{ steps.read-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read CI image tag
        id: read-tag
        run: echo "tag=$(cat .github/ci-image-tag | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'apex_infra/docker/ci.Dockerfile'
              - 'apex_infra/docker/tools-base.Dockerfile'
              - '**/vcpkg.json'
            source:
              - '**/*.cpp'
              - '**/*.hpp'
              - '**/*.h'
              - '.clang-format'
              - '**/CMakeLists.txt'
              - '**/CMakePresets.json'
              - '**/vcpkg.json'
              - 'cmake/**'
              - '**/*_suppressions.txt'
              - '.github/workflows/**'
              - 'build.bat'
              - 'build.sh'
              - 'apex_core/build.bat'
              - 'apex_core/build.sh'
              - 'apex_tools/build-preflight.bat'
              - 'apex_tools/build-preflight.sh'
            go:
              - 'apex_tools/apex-agent/**/*.go'
              - 'apex_tools/apex-agent/go.mod'
              - 'apex_tools/apex-agent/go.sum'

  # ── Format check (clang-format) ────────────────
  format-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes]
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: pip install clang-format==21.1.8
      - name: Check formatting
        run: |
          find apex_core apex_shared apex_services \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
            ! -name '*_generated.h' \
            | xargs clang-format --dry-run --Werror

  build-image:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    uses: ./.github/workflows/docker-images.yml
    permissions:
      contents: write
      packages: write

  # ── Source build & test ──────────────────────────
  build:
    permissions:
      contents: read
    needs: [changes, build-image]
    if: >-
      always() &&
      needs.changes.outputs.source == 'true' &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            preset: debug
            container: true
          - name: linux-gcc-release
            os: ubuntu-latest
            preset: release
            container: true
          - name: linux-asan
            os: ubuntu-latest
            preset: asan
            container: true
          - name: linux-tsan
            os: ubuntu-latest
            preset: tsan
            container: true
          - name: linux-ubsan
            os: ubuntu-latest
            preset: ubsan
            container: true
          # MSVC는 별도 build-msvc 잡으로 분리 (sccache 기반)

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: ghcr.io/gazuua/apex-pipeline-ci:${{ needs.changes.outputs.ci_image_tag }}

    env:
      VCPKG_ROOT: /opt/vcpkg

    steps:
      - uses: actions/checkout@v4

      # ── Build & test ─────────────────────────────
      - name: Configure
        run: >-
          cmake --preset ${{ matrix.preset }}
          -DVCPKG_INSTALLED_DIR=/opt/vcpkg_installed

      - name: Build
        run: cmake --build build/Linux/${{ matrix.preset }}

      - name: Upload service binaries
        if: matrix.name == 'linux-gcc'
        uses: actions/upload-artifact@v4
        with:
          name: service-binaries
          path: |
            build/Linux/debug/apex_services/gateway/apex_gateway
            build/Linux/debug/apex_services/auth-svc/auth_svc_main
            build/Linux/debug/apex_services/chat-svc/chat_svc_main
            build/Linux/debug/apex_services/tests/e2e/apex_e2e_tests
          retention-days: 1

      - name: Test
        if: matrix.preset != 'release'
        run: ctest --preset ${{ matrix.preset }} -LE e2e

  # ── E2E integration tests ─────────────────────
  e2e:
    permissions:
      contents: read
    needs: [changes, build]
    if: >-
      always() &&
      needs.changes.outputs.source == 'true' &&
      needs.build.result == 'success'
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI_IMAGE_TAG: ${{ needs.changes.outputs.ci_image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Download service binaries
        uses: actions/download-artifact@v4
        with:
          name: service-binaries
          path: artifacts

      - name: Make binaries executable
        run: chmod +x artifacts/gateway/apex_gateway artifacts/auth-svc/auth_svc_main artifacts/chat-svc/chat_svc_main artifacts/tests/e2e/apex_e2e_tests

      # 인프라만 Docker로 기동 (Kafka, Redis×4, PostgreSQL)
      # 서비스(Gateway, Auth, Chat)는 호스트에서 직접 실행 — Docker 이미지 빌드 불필요
      - name: Start infrastructure
        run: |
          docker compose -f apex_infra/docker/docker-compose.e2e.yml up -d \
            kafka redis-auth redis-ratelimit redis-chat redis-pubsub postgres \
            --wait --timeout 120

      - name: Start services
        run: |
          nohup artifacts/gateway/apex_gateway apex_services/tests/e2e/gateway_e2e.toml > /tmp/gateway.log 2>&1 &
          nohup artifacts/auth-svc/auth_svc_main apex_services/tests/e2e/auth_svc_e2e.toml > /tmp/auth.log 2>&1 &
          nohup artifacts/chat-svc/chat_svc_main apex_services/tests/e2e/chat_svc_e2e.toml > /tmp/chat.log 2>&1 &

          # Gateway TCP 포트 대기 (최대 60초) + Kafka consumer rebalance 여유
          timeout 60 bash -c 'until nc -z 127.0.0.1 8443 2>/dev/null; do sleep 1; done'
          sleep 5  # Kafka consumer rebalance 추가 대기

      - name: Run E2E tests
        run: |
          artifacts/tests/e2e/apex_e2e_tests \
            --gtest_output=xml:e2e-results.xml
        env:
          E2E_GATEWAY_HOST: "127.0.0.1"
          E2E_GATEWAY_TCP_PORT: "8443"
          E2E_STARTUP_TIMEOUT: "60"

      - name: Service logs (debug)
        if: always()
        run: |
          echo "=== Gateway ===" && cat /tmp/gateway.log 2>/dev/null | tail -30 || true
          echo "=== Auth ===" && cat /tmp/auth.log 2>/dev/null | tail -30 || true
          echo "=== Chat ===" && cat /tmp/chat.log 2>/dev/null | tail -30 || true

      - name: Teardown
        if: always()
        run: |
          pkill -f apex_gateway || true
          pkill -f auth_svc_main || true
          pkill -f chat_svc_main || true
          docker compose -f apex_infra/docker/docker-compose.e2e.yml down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results.xml
          retention-days: 7

  # ── Go (apex-agent) ──────────────────────────────
  go-test:
    permissions:
      contents: read
    name: Go (apex-agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    defaults:
      run:
        working-directory: apex_tools/apex-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apex_tools/apex-agent/go.mod
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./... -race -cover -v
      - name: Build (linux)
        run: go build -o apex-agent ./cmd/apex-agent
      - name: Build (windows cross-compile)
        run: GOOS=windows GOARCH=amd64 go build -o apex-agent.exe ./cmd/apex-agent

  # ── MSVC build & test (sccache) ────────────────────
  build-msvc:
    permissions:
      contents: read
    needs: [changes]
    if: >-
      needs.changes.outputs.source == 'true' &&
      !contains(github.event.head_commit.message, '[skip-msvc]')
    name: msvc-release
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install sccache
        run: |
          $url = "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile sccache.zip
          Expand-Archive sccache.zip -DestinationPath sccache-bin
          $sccachePath = "$env:RUNNER_TEMP\sccache-bin"
          New-Item -ItemType Directory -Force -Path $sccachePath | Out-Null
          Copy-Item sccache-bin/sccache-v0.14.0-x86_64-pc-windows-msvc/sccache.exe "$sccachePath\sccache.exe"
          "$sccachePath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$sccachePath\sccache.exe" --version
        shell: pwsh

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Mozilla\sccache\cache
          key: sccache-msvc-${{ github.sha }}
          restore-keys: sccache-msvc-

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-bin-msvc-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: vcpkg-bin-msvc-

      - name: Configure
        run: cmake --preset release-sccache

      - name: Build
        run: cmake --build build/Windows/release-sccache

      - name: Test
        run: ctest --preset release-sccache -LE e2e

  # ── Docker Bake (서비스 이미지 빌드) ─────────────────
  bake-services:
    permissions:
      contents: read
      packages: write
    needs: [changes, build]
    if: >-
      always() &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Bake service images
        env:
          CI_IMAGE_TAG: ${{ needs.changes.outputs.ci_image_tag }}
          SHA_TAG: sha-${{ github.sha }}
          IS_MAIN: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          CMAKE_PRESET: ${{ github.ref == 'refs/heads/main' && 'release' || 'debug' }}
          BUILDX_BAKE_ENTITLEMENTS_FS: "0"
        run: |
          if [ "$IS_MAIN" = "true" ]; then
            docker buildx bake -f apex_infra/docker/docker-bake.hcl services --push
          else
            docker buildx bake -f apex_infra/docker/docker-bake.hcl services \
              --set '*.output=type=docker' \
              --set '*.cache-to='
          fi

  # ── Trivy security scan ──────────────────────────────
  scan:
    permissions:
      contents: read
    needs: [bake-services]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.bake-services.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        service: [gateway, auth-svc, chat-svc]
    steps:
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/gazuua/apex-pipeline-${{ matrix.service }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

  # ── Helm minikube 실배포 검증 ───────────────────────
  helm-validation:
    permissions:
      contents: read
      packages: read
    needs: [bake-services]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.bake-services.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: azure/setup-helm@v4

      - name: Start minikube
        uses: medyagh/setup-minikube@v0.0.21
        with:
          memory: '4096'
          cpus: '2'

      - name: Pull and load service images into minikube
        env:
          SHA_TAG: sha-${{ github.sha }}
        run: |
          for svc in gateway auth-svc chat-svc; do
            echo "Loading $svc..."
            docker pull ghcr.io/gazuua/apex-pipeline-$svc:$SHA_TAG
            minikube image load ghcr.io/gazuua/apex-pipeline-$svc:$SHA_TAG
          done

      - name: Helm dependency update
        working-directory: apex_infra/k8s/apex-pipeline
        run: helm dependency update .

      - name: Install infra release
        working-directory: apex_infra/k8s/apex-pipeline
        run: |
          helm upgrade --install apex-infra . \
            -n apex-infra --create-namespace \
            --set gateway.enabled=false \
            --set auth-svc.enabled=false \
            --set chat-svc.enabled=false \
            --set log-svc.enabled=false \
            --wait --timeout 7m

      - name: Verify infra pods
        run: |
          echo "=== Infra Pods ==="
          kubectl get pods -n apex-infra
          kubectl wait --for=condition=ready pod --all -n apex-infra --timeout=60s

      - name: Install services release
        working-directory: apex_infra/k8s/apex-pipeline
        env:
          SHA_TAG: sha-${{ github.sha }}
        run: |
          helm upgrade --install apex-services . \
            -n apex-services --create-namespace \
            --set kafka.enabled=false \
            --set redis-auth.enabled=false \
            --set redis-ratelimit.enabled=false \
            --set redis-chat.enabled=false \
            --set redis-pubsub.enabled=false \
            --set postgresql.enabled=false \
            --set pgbouncer.enabled=false \
            --set namespaces.create=false \
            --set gateway.serviceMonitor.enabled=false \
            --set auth-svc.serviceMonitor.enabled=false \
            --set chat-svc.serviceMonitor.enabled=false \
            --set gateway.image.tag=$SHA_TAG \
            --set auth-svc.image.tag=$SHA_TAG \
            --set chat-svc.image.tag=$SHA_TAG \
            --wait --timeout 5m

      - name: Verify services pods
        run: |
          echo "=== Services Pods ==="
          kubectl get pods -n apex-services
          kubectl wait --for=condition=ready pod --all -n apex-services --timeout=120s

      - name: Helm test
        run: helm test apex-services -n apex-services

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Infra Pods ==="
          kubectl get pods -n apex-infra -o wide
          echo "=== Services Pods ==="
          kubectl get pods -n apex-services -o wide
          for ns in apex-infra apex-services; do
            for pod in $(kubectl get pods -n $ns --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
              echo "=== Describe: $ns/$pod ==="
              kubectl describe pod $pod -n $ns 2>/dev/null | tail -40 || true
              echo "=== Logs: $ns/$pod ==="
              kubectl logs $pod -n $ns --tail=30 2>/dev/null || true
            done
          done

  # ── Docker compose 스모크 테스트 ─────────────────
  smoke-test:
    permissions:
      contents: read
    needs: [changes, build, bake-services]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.bake-services.result == 'success' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHA_TAG: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Download E2E binary
        uses: actions/download-artifact@v4
        with:
          name: service-binaries
          path: artifacts

      - name: Make binary executable
        run: chmod +x artifacts/tests/e2e/apex_e2e_tests

      - name: Pull service images
        run: |
          for svc in gateway auth-svc chat-svc; do
            docker pull ghcr.io/gazuua/apex-pipeline-$svc:$SHA_TAG || true
          done

      - name: Start full stack
        run: |
          docker compose -f apex_infra/docker/docker-compose.smoke.yml up -d \
            --wait --timeout 120

      - name: Health check
        run: |
          echo "Waiting for gateway health..."
          timeout 30 bash -c 'until curl -sf http://localhost:8081/health 2>/dev/null; do sleep 2; done' || {
            echo "Health check failed, checking gateway TCP port..."
            nc -z localhost 8443 && echo "TCP port OK but metrics not available" || echo "TCP port also unreachable"
          }

      - name: Run smoke E2E subset
        run: |
          artifacts/tests/e2e/apex_e2e_tests \
            --gtest_filter="*Login*:*SendMessage*" \
            --gtest_output=xml:smoke-results.xml
        env:
          E2E_GATEWAY_HOST: "127.0.0.1"
          E2E_GATEWAY_TCP_PORT: "8443"

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f apex_infra/docker/docker-compose.smoke.yml logs > smoke-logs.txt 2>&1

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: smoke-logs.txt

      - name: Teardown
        if: always()
        run: docker compose -f apex_infra/docker/docker-compose.smoke.yml down -v

  # ── Argo Rollouts canary 배포 검증 ──────────────
  deploy:
    permissions:
      contents: read
      packages: read
    needs: [bake-services, smoke-test, helm-validation]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.smoke-test.result == 'success' &&
      needs.helm-validation.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: azure/setup-helm@v4

      - name: Start minikube
        uses: medyagh/setup-minikube@v0.0.21
        with:
          memory: '4096'
          cpus: '2'

      - name: Install Argo Rollouts CRD
        run: |
          kubectl apply -f https://github.com/argoproj/argo-rollouts/releases/download/v1.7.2/install.yaml

      - name: Wait for Argo Rollouts controller
        run: |
          kubectl wait --for=condition=available deployment/argo-rollouts \
            -n argo-rollouts --timeout=120s

      - name: Load images into minikube
        env:
          SHA_TAG: sha-${{ github.sha }}
        run: |
          for svc in gateway auth-svc chat-svc; do
            echo "Loading $svc..."
            docker pull ghcr.io/gazuua/apex-pipeline-$svc:$SHA_TAG
            minikube image load ghcr.io/gazuua/apex-pipeline-$svc:$SHA_TAG
          done

      - name: Helm dependency update
        working-directory: apex_infra/k8s/apex-pipeline
        run: helm dependency update .

      - name: Install infra release
        working-directory: apex_infra/k8s/apex-pipeline
        run: |
          helm upgrade --install apex-infra . \
            -n apex-infra --create-namespace \
            --set gateway.enabled=false \
            --set auth-svc.enabled=false \
            --set chat-svc.enabled=false \
            --set log-svc.enabled=false \
            --wait --timeout 7m

      - name: Install services with Rollouts
        working-directory: apex_infra/k8s/apex-pipeline
        env:
          SHA_TAG: sha-${{ github.sha }}
        run: |
          helm upgrade --install apex-services . \
            -n apex-services --create-namespace \
            --set kafka.enabled=false \
            --set redis-auth.enabled=false \
            --set redis-ratelimit.enabled=false \
            --set redis-chat.enabled=false \
            --set redis-pubsub.enabled=false \
            --set postgresql.enabled=false \
            --set pgbouncer.enabled=false \
            --set namespaces.create=false \
            --set gateway.rollouts.enabled=true \
            --set auth-svc.rollouts.enabled=true \
            --set chat-svc.rollouts.enabled=true \
            --set gateway.serviceMonitor.enabled=false \
            --set auth-svc.serviceMonitor.enabled=false \
            --set chat-svc.serviceMonitor.enabled=false \
            --set gateway.image.tag=$SHA_TAG \
            --set auth-svc.image.tag=$SHA_TAG \
            --set chat-svc.image.tag=$SHA_TAG \
            --wait --timeout 5m

      - name: Verify Rollout resources
        run: |
          echo "=== Rollouts ==="
          kubectl get rollouts -n apex-services -o wide 2>/dev/null || echo "No rollouts found"
          echo "=== Pods ==="
          kubectl get pods -n apex-services -o wide
          kubectl wait --for=condition=ready pod --all -n apex-services --timeout=120s

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Argo Rollouts Controller ==="
          kubectl get pods -n argo-rollouts -o wide 2>/dev/null || true
          kubectl logs -n argo-rollouts -l app.kubernetes.io/name=argo-rollouts --tail=30 2>/dev/null || true
          echo "=== Rollouts ==="
          kubectl get rollouts -n apex-services -o wide 2>/dev/null || true
          echo "=== Pods ==="
          kubectl get pods -n apex-services -o wide
          for pod in $(kubectl get pods -n apex-services --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
            echo "=== Describe: $pod ==="
            kubectl describe pod $pod -n apex-services 2>/dev/null | tail -30 || true
            echo "=== Logs: $pod ==="
            kubectl logs $pod -n apex-services --tail=30 2>/dev/null || true
          done
