name: CI

permissions: {}

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Path filter (Docker / Source 변경 감지) ────
  changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'apex_infra/docker/ci.Dockerfile'
              - '**/vcpkg.json'
            source:
              - '**/*.cpp'
              - '**/*.hpp'
              - '**/*.h'
              - '.clang-format'
              - '**/CMakeLists.txt'
              - '**/CMakePresets.json'
              - '**/vcpkg.json'
              - 'cmake/**'
              - '**/*_suppressions.txt'
              - '.github/workflows/**'
              - 'build.bat'
              - 'build.sh'
              - 'apex_core/build.bat'
              - 'apex_core/build.sh'
              - 'apex_tools/build-preflight.bat'
              - 'apex_tools/build-preflight.sh'

  # ── Format check (clang-format) ────────────────
  format-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: pip install clang-format==21.1.8
      - name: Check formatting
        run: |
          find apex_core apex_shared apex_services \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
            ! -name '*_generated.h' \
            | xargs clang-format --dry-run --Werror

  build-image:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    uses: ./.github/workflows/docker-build.yml
    permissions:
      contents: read
      packages: write

  # ── Source build & test ──────────────────────────
  build:
    permissions:
      contents: read
    needs: [changes, build-image]
    if: >-
      always() &&
      needs.changes.outputs.source == 'true' &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            preset: debug
            container: true
          - name: linux-asan
            os: ubuntu-latest
            preset: asan
            container: true
          - name: linux-tsan
            os: ubuntu-latest
            preset: tsan
            container: true
          - name: windows-msvc
            os: windows-latest
            preset: debug
            container: false

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container && 'ghcr.io/gazuua/apex-pipeline-ci:latest' || '' }}

    env:
      VCPKG_ROOT: ${{ matrix.container && '/opt/vcpkg' || format('{0}/vcpkg', github.workspace) }}

    steps:
      # ── Non-container setup (Windows only) ───────
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        if: ${{ !matrix.container }}
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b1b19307e2d2ec1eefbdb7ea069de7d4bcd31f01'

      - name: Cache vcpkg_installed (Windows)
        if: ${{ !matrix.container }}
        uses: actions/cache@v4
        with:
          path: apex_core/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'apex_core/vcpkg.json', 'apex_shared/vcpkg.json') }}

      - name: Setup Ninja
        if: ${{ !matrix.container }}
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ── Build & test ─────────────────────────────
      - name: Configure
        working-directory: apex_core
        run: >-
          cmake --preset ${{ matrix.preset }}
          ${{ matrix.container && '-DVCPKG_INSTALLED_DIR=/opt/vcpkg_installed' || '' }}

      - name: Build
        working-directory: apex_core
        run: cmake --build build/${{ runner.os == 'Windows' && 'Windows' || 'Linux' }}/${{ matrix.preset }}

      - name: Test
        working-directory: apex_core
        run: ctest --preset ${{ matrix.preset }}

  # ── Root build integrity check ───────────────────
  build-root:
    permissions:
      contents: read
    needs: [changes, build-image]
    if: >-
      always() &&
      needs.changes.outputs.source == 'true' &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    name: root-linux-gcc
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gazuua/apex-pipeline-ci:latest

    env:
      VCPKG_ROOT: /opt/vcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset debug -DVCPKG_INSTALLED_DIR=/opt/vcpkg_installed

      - name: Build
        run: cmake --build build/Linux/debug

      - name: Test
        run: ctest --preset debug
