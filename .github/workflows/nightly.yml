name: Nightly Valgrind

permissions: {}

on:
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = KST 03:00
  workflow_dispatch:
    inputs:
      scope:
        description: 'Valgrind 범위'
        type: choice
        options:
          - all
          - unit-only
          - e2e-only
        default: all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Read CI image tag ──────────────────────────────────────────
  read-tag:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      ci_image_tag: ${{ steps.read-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/ci-image-tag
          sparse-checkout-cone-mode: false
      - name: Read CI image tag
        id: read-tag
        run: echo "tag=$(cat .github/ci-image-tag | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

  # ── Unit tests under Valgrind (self-contained build) ──────────
  valgrind-unit:
    needs: read-tag
    permissions:
      contents: read
    if: >-
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'unit-only' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/gazuua/apex-pipeline-ci:${{ needs.read-tag.outputs.ci_image_tag }}
    env:
      VCPKG_ROOT: /opt/vcpkg
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset debug -DVCPKG_INSTALLED_DIR=/opt/vcpkg_installed

      - name: Build
        run: cmake --build build/Linux/debug

      - name: Install Valgrind
        run: apt-get update && apt-get install -y valgrind

      - name: Run unit tests under Valgrind
        run: |
          ctest --test-dir build/Linux/debug \
            -LE "e2e|e2e_stress" \
            --overwrite MemoryCheckCommand=/usr/bin/valgrind \
            --overwrite "MemoryCheckCommandOptions=--tool=memcheck --leak-check=full --error-exitcode=1" \
            -T MemCheck \
            --output-on-failure

  # ── Build for E2E (artifact for valgrind-e2e) ────────────────
  build:
    needs: read-tag
    permissions:
      contents: read
    if: >-
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'e2e-only' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/gazuua/apex-pipeline-ci:${{ needs.read-tag.outputs.ci_image_tag }}
    env:
      VCPKG_ROOT: /opt/vcpkg
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset debug -DVCPKG_INSTALLED_DIR=/opt/vcpkg_installed

      - name: Build
        run: cmake --build build/Linux/debug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build
          path: |
            build/Linux/debug/apex_services/gateway/apex_gateway
            build/Linux/debug/apex_services/auth-svc/auth_svc_main
            build/Linux/debug/apex_services/chat-svc/chat_svc_main
            build/Linux/debug/apex_services/tests/e2e/apex_e2e_tests
            build/Linux/debug/apex_services/tests/e2e/apex_e2e_stress_tests
          retention-days: 1

  # ── E2E tests under Valgrind (host — needs Docker for infra) ─
  valgrind-e2e:
    permissions:
      contents: read
    needs: [read-tag, build]
    if: >-
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'e2e-only' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI_IMAGE_TAG: ${{ needs.read-tag.outputs.ci_image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nightly-build
          path: build/Linux/debug

      - name: Make binaries executable
        run: |
          chmod +x \
            build/Linux/debug/gateway/apex_gateway \
            build/Linux/debug/auth-svc/auth_svc_main \
            build/Linux/debug/chat-svc/chat_svc_main \
            build/Linux/debug/tests/e2e/apex_e2e_tests \
            build/Linux/debug/tests/e2e/apex_e2e_stress_tests

      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      # 인프라만 Docker로 기동 (Kafka, Redis x4, PostgreSQL)
      # 서비스는 Valgrind 하에서 호스트 직접 실행 — Docker 네트워크 localhost 이슈 회피
      - name: Start infrastructure
        run: |
          docker compose -f apex_infra/docker/docker-compose.e2e.yml up -d \
            kafka redis-auth redis-ratelimit redis-chat redis-pubsub postgres \
            --wait --timeout 120

      - name: Start services under Valgrind
        run: |
          nohup valgrind --tool=memcheck --leak-check=full --error-exitcode=1 \
            build/Linux/debug/gateway/apex_gateway \
            apex_services/tests/e2e/gateway_e2e_valgrind.toml > /tmp/gateway.log 2>&1 &
          nohup valgrind --tool=memcheck --leak-check=full --error-exitcode=1 \
            build/Linux/debug/auth-svc/auth_svc_main \
            apex_services/tests/e2e/auth_svc_e2e.toml > /tmp/auth.log 2>&1 &
          nohup valgrind --tool=memcheck --leak-check=full --error-exitcode=1 \
            build/Linux/debug/chat-svc/chat_svc_main \
            apex_services/tests/e2e/chat_svc_e2e.toml > /tmp/chat.log 2>&1 &

          # Valgrind 하에서는 기동이 느리므로 Gateway TCP 포트 대기 (최대 300초)
          timeout 300 bash -c 'until nc -z 127.0.0.1 8443 2>/dev/null; do sleep 2; done'
          sleep 60  # Kafka consumer rebalance 추가 대기 (Valgrind 하 확대)

      # Valgrind 제외 테스트:
      #   RefreshTokenRenewal — 토큰 TTL 타이밍 의존
      #   ServiceRecoveryAfterTimeout — boost::asio SO_RCVTIMEO 비호환
      #   ServiceTimeout — recv(15s) vs Gateway request_timeout(120s), Valgrind에서 타임아웃 테스트 무의미
      #   RoomMessageBroadcast — PubSub 메시지 순서 비결정적 (Valgrind 감속 하)
      #   GlobalBroadcast — 하드코딩 recv(5s)가 Valgrind 10-20x 감속에서 부족
      - name: Run E2E tests
        run: |
          build/Linux/debug/tests/e2e/apex_e2e_tests \
            --gtest_filter=-AuthE2ETest.RefreshTokenRenewal:TimeoutE2ETest.ServiceRecoveryAfterTimeout:TimeoutE2ETest.ServiceTimeout:ChatE2ETest.RoomMessageBroadcast:ChatE2ETest.GlobalBroadcast
        env:
          E2E_GATEWAY_HOST: "127.0.0.1"
          E2E_GATEWAY_TCP_PORT: "8443"
          E2E_STARTUP_TIMEOUT: "180"
          E2E_REQUEST_TIMEOUT: "120"

      # Valgrind 제외 스트레스 테스트:
      #   KafkaReconnect — 브로커 재시작 후 재연결 타이밍이 Valgrind 감속 하 불안정
      #   RedisReconnect — Redis 재시작 후 재연결 타이밍이 Valgrind 감속 하 불안정
      #   MassTimeouts — 대량 타임아웃 30s 제한이 Valgrind 10-20x 감속에서 부족
      #   HalfOpenConnection — Valgrind 감속으로 로그인 응답이 에러 반환 (payload_size 20 vs 680)
      #   DisconnectDuringResponse — 동일 원인 (로그인 단계에서 에러 응답)
      #   ConcurrentRoomJoinLeave — 다중 클라이언트 로그인이 Valgrind 감속 하 EOF 실패
      - name: Run stress tests
        run: |
          build/Linux/debug/tests/e2e/apex_e2e_stress_tests \
            --gtest_filter=-E2EStressInfraFixture.KafkaReconnect:E2EStressInfraFixture.RedisReconnect:E2EStressInfraFixture.MassTimeouts:E2EStressConnectionFixture.HalfOpenConnection:E2EStressConnectionFixture.DisconnectDuringResponse:E2EStressConcurrencyFixture.ConcurrentRoomJoinLeave
        env:
          E2E_GATEWAY_HOST: "127.0.0.1"
          E2E_GATEWAY_TCP_PORT: "8443"
          E2E_STARTUP_TIMEOUT: "180"
          E2E_REQUEST_TIMEOUT: "120"
          E2E_STRESS_CONNECTIONS: "3"
          E2E_STRESS_MESSAGES: "5"
          E2E_STRESS_TIMEOUT_SEC: "900"

      - name: Service logs (debug)
        if: always()
        run: |
          echo "=== Gateway ===" && tail -100 /tmp/gateway.log 2>/dev/null || true
          echo "=== Auth ===" && tail -100 /tmp/auth.log 2>/dev/null || true
          echo "=== Chat ===" && tail -100 /tmp/chat.log 2>/dev/null || true

      - name: Teardown
        if: always()
        run: |
          pkill -f valgrind || true
          sleep 5
          docker compose -f apex_infra/docker/docker-compose.e2e.yml down -v
