# Auth Service E2E Test Configuration

[logging]
service_name = "auth-svc"

[logging.file]
enabled = true

[jwt]
private_key_file = "apex_services/tests/keys/test_rs256.pem"
public_key_file = "apex_services/tests/keys/test_rs256_pub.pem"
issuer = "apex-auth"
access_token_ttl_sec = 10      # E2E용 — RefreshTokenRenewal 대기 시간 최소화 (CI 안정성)

[kafka]
brokers = "localhost:9092"
consumer_group = "auth-svc-e2e"
request_topic = "auth.requests"
response_topic = "gateway.responses"

[redis]
host = "localhost"
port = 6380
password = "dev_redis_pass"

[pg]
connection_string = "host=localhost port=5432 dbname=apex_db user=apex_admin password=apex_e2e_password options='-c search_path=auth_svc,public'"

[bcrypt]
work_factor = 12

[session]
ttl_sec = 86400
