# Chat Service E2E Test Configuration

[chat]
max_message_length = 2000
max_room_name_length = 100
max_rooms_per_user = 50
history_page_size = 50
response_topic = "gateway.responses"

[kafka]
brokers = "localhost:9092"
consumer_group = "chat-svc-e2e"
request_topic = "chat.requests"
response_topic = "gateway.responses"

[redis_data]
host = "localhost"
port = 6382

[redis_pubsub]
host = "localhost"
port = 6383

[pg]
connection_string = "host=localhost port=5432 dbname=apex_db user=apex_admin password=apex_e2e_password options='-c search_path=chat_svc,public'"
