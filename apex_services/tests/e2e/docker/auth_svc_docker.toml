# Auth Service Docker E2E Configuration
# Docker 환경용 — 컨테이너 내부 경로 + Docker 네트워크 엔드포인트

[logging]
service_name = "auth-svc"

[logging.file]
enabled = true

[jwt]
private_key_file = "keys/test_rs256.pem"
public_key_file = "keys/test_rs256_pub.pem"
issuer = "apex-auth"
access_token_ttl_sec = 10

[kafka]
brokers = "kafka:9092"
consumer_group = "auth-svc-e2e"
request_topic = "auth.requests"
response_topic = "gateway.responses"

[redis]
host = "redis-auth"
port = 6379
password = "dev_redis_pass"

[pg]
connection_string = "host=postgres port=5432 dbname=apex_db user=apex_admin password=apex_e2e_password options='-c search_path=auth_svc,public'"

[bcrypt]
work_factor = 12

[session]
ttl_sec = 86400

[metrics]
enabled = true
port = 8081
