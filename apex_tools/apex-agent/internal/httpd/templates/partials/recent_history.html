{{define "partial-recent-history"}}
{{if .History}}
<div class="timeline">
{{range .History}}
  <div class="tl-item">
    <div class="tl-title">{{.GitBranch}}</div>
    <div class="tl-meta">
      <span class="badge {{if eq .Action "merged"}}badge-green{{else}}badge-red{{end}}">{{.Action}}</span>
      {{.CompletedAt}}
    </div>
  </div>
{{end}}
</div>
{{else}}
<div class="empty-state">No recent history</div>
{{end}}
{{end}}
