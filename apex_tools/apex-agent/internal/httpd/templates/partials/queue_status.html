{{define "partial-queue-status"}}
{{if .Queue}}
{{range .Queue}}
<div class="lock-card">
  <div class="lock-indicator {{if eq .Status "ACTIVE"}}locked{{else if eq .Status "WAITING"}}waiting{{else}}done{{end}}"></div>
  <div>
    <div style="font-weight:600">{{.Channel}} — {{.Branch}}</div>
    <div class="tl-meta">
      <span class="badge {{if eq .Status "ACTIVE"}}badge-red{{else if eq .Status "WAITING"}}badge-amber{{else}}badge-blue{{end}}">{{.Status}}</span>
      {{.CreatedAt}}
      {{if or (eq .Status "ACTIVE") (eq .Status "WAITING")}}<span class="elapsed" data-since="{{.CreatedAt}}"></span>{{end}}
    </div>
  </div>
</div>
{{end}}
{{else}}
<div class="empty-state">No queue entries</div>
{{end}}
{{end}}
