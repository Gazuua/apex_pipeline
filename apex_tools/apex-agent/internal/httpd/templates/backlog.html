{{define "content"}}
<h1 class="page-title">Backlog</h1>

<div class="filter-bar" id="backlog-filters">
  <div class="multi-filter">
    <span class="filter-label">Status:</span>
    <label class="chip"><input type="checkbox" name="status" value="OPEN" onchange="applyFilters()"> Open</label>
    <label class="chip"><input type="checkbox" name="status" value="FIXING" onchange="applyFilters()"> Fixing</label>
    <label class="chip"><input type="checkbox" name="status" value="RESOLVED" onchange="applyFilters()"> Resolved</label>
  </div>
  <div class="multi-filter">
    <span class="filter-label">Severity:</span>
    <label class="chip"><input type="checkbox" name="severity" value="CRITICAL" onchange="applyFilters()"> Critical</label>
    <label class="chip"><input type="checkbox" name="severity" value="MAJOR" onchange="applyFilters()"> Major</label>
    <label class="chip"><input type="checkbox" name="severity" value="MINOR" onchange="applyFilters()"> Minor</label>
  </div>
  <div class="multi-filter">
    <span class="filter-label">Timeframe:</span>
    <label class="chip"><input type="checkbox" name="timeframe" value="NOW" onchange="applyFilters()"> Now</label>
    <label class="chip"><input type="checkbox" name="timeframe" value="IN_VIEW" onchange="applyFilters()"> In View</label>
    <label class="chip"><input type="checkbox" name="timeframe" value="DEFERRED" onchange="applyFilters()"> Deferred</label>
  </div>
  <div class="multi-filter">
    <span class="filter-label">Scope:</span>
    <label class="chip"><input type="checkbox" name="scope" value="CORE" onchange="applyFilters()"> Core</label>
    <label class="chip"><input type="checkbox" name="scope" value="SHARED" onchange="applyFilters()"> Shared</label>
    <label class="chip"><input type="checkbox" name="scope" value="TOOLS" onchange="applyFilters()"> Tools</label>
    <label class="chip"><input type="checkbox" name="scope" value="INFRA" onchange="applyFilters()"> Infra</label>
    <label class="chip"><input type="checkbox" name="scope" value="CI" onchange="applyFilters()"> CI</label>
    <label class="chip"><input type="checkbox" name="scope" value="DOCS" onchange="applyFilters()"> Docs</label>
  </div>
  <div class="multi-filter">
    <span class="filter-label">Type:</span>
    <label class="chip"><input type="checkbox" name="type" value="BUG" onchange="applyFilters()"> Bug</label>
    <label class="chip"><input type="checkbox" name="type" value="DESIGN_DEBT" onchange="applyFilters()"> Design Debt</label>
    <label class="chip"><input type="checkbox" name="type" value="INFRA" onchange="applyFilters()"> Infra</label>
    <label class="chip"><input type="checkbox" name="type" value="TEST" onchange="applyFilters()"> Test</label>
    <label class="chip"><input type="checkbox" name="type" value="PERF" onchange="applyFilters()"> Perf</label>
    <label class="chip"><input type="checkbox" name="type" value="DOCS" onchange="applyFilters()"> Docs</label>
  </div>
  <button class="rate-btn" onclick="resetBacklogFilters()" style="margin-left:auto;padding:6px 14px;font-size:0.82rem">Reset</button>
</div>

<div id="backlog-table">
  {{template "partial-backlog-table" .}}
</div>

<script>
var currentSort = '';
var currentDir = '';

function applyFilters() {
    var params = new URLSearchParams();
    document.querySelectorAll('#backlog-filters input[type=checkbox]:checked').forEach(function(cb) {
        params.append(cb.name, cb.value);
    });
    if (currentSort) { params.set('sort', currentSort); params.set('dir', currentDir); }
    htmx.ajax('GET', '/partials/backlog-table?' + params.toString(), {target:'#backlog-table'});
}

function sortBy(col) {
    if (currentSort === col) {
        currentDir = currentDir === 'ASC' ? 'DESC' : 'ASC';
    } else {
        currentSort = col;
        currentDir = col === 'id' ? 'DESC' : 'ASC';
    }
    applyFilters();
}

function resetBacklogFilters() {
    document.querySelectorAll('#backlog-filters input[type=checkbox]').forEach(function(cb) { cb.checked = false; });
    currentSort = '';
    currentDir = '';
    htmx.ajax('GET', '/partials/backlog-table', {target:'#backlog-table'});
}

function toggleBacklogDetail(id) {
    document.querySelectorAll('.backlog-detail-row').forEach(function(row) {
        if (row.id !== 'detail-' + id) row.hidden = true;
    });
    var el = document.getElementById('detail-' + id);
    if (el) el.hidden = !el.hidden;
}
</script>
{{end}}
