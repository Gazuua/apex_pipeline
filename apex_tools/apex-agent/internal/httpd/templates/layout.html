{{define "layout"}}<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js"></script>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand"><span class="grad">Apex</span> Dashboard</a>
  <ul class="nav-links">
    <li><a href="/" {{if eq .Page "dashboard"}}class="active"{{end}}>Dashboard</a></li>
    <li><a href="/backlog" {{if eq .Page "backlog"}}class="active"{{end}}>Backlog</a></li>
    <li><a href="/handoff" {{if eq .Page "handoff"}}class="active"{{end}}>Handoff</a></li>
    <li><a href="/queue" {{if eq .Page "queue"}}class="active"{{end}}>Queue</a></li>
    <li><a href="/branches" {{if eq .Page "branches"}}class="active"{{end}}>Branches</a></li>
  </ul>
  <div class="nav-right">
    <span id="blocked-badge"
          hx-get="/partials/blocked-badge"
          hx-trigger="load, every 2s"
          data-poll></span>
    <div class="poll-rate">
      <button onclick="setPollRate('500ms')" class="rate-btn" data-rate="500ms">Fast</button>
      <button onclick="setPollRate('1s')" class="rate-btn active" data-rate="1s">Normal</button>
      <button onclick="setPollRate('2s')" class="rate-btn" data-rate="2s">Slow</button>
    </div>
  </div>
</nav>

<div class="container">
  {{template "content" .}}
</div>

<script>
function setPollRate(rate) {
    localStorage.setItem('apexPollRate', rate);
    document.querySelectorAll('[data-poll]').forEach(function(el) {
        el.setAttribute('hx-trigger', 'every ' + rate);
        htmx.process(el);
    });
    document.querySelectorAll('.rate-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.querySelector('[data-rate="'+rate+'"]');
    if (btn) btn.classList.add('active');
}
document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('apexPollRate');
    if (saved) setPollRate(saved);
});

// Elapsed time updater for queue entries
function updateElapsed() {
    document.querySelectorAll('.elapsed[data-since]').forEach(function(el) {
        var since = el.dataset.since;
        if (!since) return;
        var start = new Date(since.replace(' ', 'T'));
        var diff = Math.floor((Date.now() - start.getTime()) / 1000);
        if (diff < 0) diff = 0;
        var h = Math.floor(diff / 3600);
        var m = Math.floor((diff % 3600) / 60);
        var s = diff % 60;
        var text = '';
        if (h > 0) text += h + 'h ';
        if (m > 0 || h > 0) text += m + 'm ';
        text += s + 's';
        el.textContent = '(' + text + ')';
    });
}
setInterval(updateElapsed, 1000);
updateElapsed();
// Re-run after HTMX swaps (polling replaces elements)
document.body.addEventListener('htmx:afterSwap', updateElapsed);
</script>

</body>
</html>
{{end}}
